global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: anomaly_detection
    static_configs:
      - targets: ["anomaly_detection:8003"]
    metrics_path: /metrics

  - job_name: sla_forecasting
    static_configs:
      - targets: ["sla_forecasting:8004"]
    metrics_path: /metrics

  - job_name: agent
    static_configs:
      - targets: ["agent:8002"]
    metrics_path: /metrics

  - job_name: rag
    static_configs:
      - targets: ["rag:8001"]
    metrics_path: /metrics
