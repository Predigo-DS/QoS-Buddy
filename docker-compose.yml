version: "3.9"

services:

  # ─────────────────────────────────────────
  # POSTGRES (LangGraph checkpoints)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: qos-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qosbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # VECTOR STORE
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qos-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qos-network
    healthcheck:
      test: ["CMD", "/qdrant/qdrant", "--help"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period : 30s

  # ─────────────────────────────────────────
  # RAG SERVICE  (ingestion + retrieval)
  # ─────────────────────────────────────────
  rag:
    build:
      context: ./ai-services/rag
      dockerfile: Dockerfile
    container_name: qos-rag
    ports:
      - "8001:8001"
    env_file:
      - ./ai-services/rag/.env.example
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_ENABLE_PROGRESS_BARS=1
      - PYTHONIOENCODING=utf-8
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - HF_HUB_DISABLE_XET=1
      - HF_XET_HIGH_PERFORMANCE=0
      - HF_HUB_DOWNLOAD_TIMEOUT=60
      - HF_HUB_ETAG_TIMEOUT=900
      - HF_HUB_DISABLE_SYMLINKS=1
    volumes:
      - ./ai-services/rag/app:/app
      - ./data:/data:ro
      - hf_cache:/root/.cache/huggingface/hub
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period : 30s

  # ─────────────────────────────────────────
  # AGENT SERVICE  (LangGraph orchestration)
  # ─────────────────────────────────────────
  agent:
    build:
      context: ./ai-services/agent
      dockerfile: Dockerfile
    container_name: qos-agent
    ports:
      - "8002:8002"
    env_file:
      - ./ai-services/agent/.env
    environment:
      - RAG_SERVICE_URL=http://rag:8001
      - CHECKPOINT_DB_URI=postgresql://postgres:postgres@postgres:5432/qosbuddy
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOCAL_OPENAI_API_KEY=${LOCAL_OPENAI_API_KEY:-}
      - TOKEN_FACTORY_API_KEY=${TOKEN_FACTORY_API_KEY:-}
      - ACTION_REDIS_URL=redis://qosentry-redis:6379
      - MININET_API_URL=http://192.168.1.114:8000
    extra_hosts:
      - "mininet-vm:192.168.1.114"

    volumes:
      - ./ai-services/agent/app:/app
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - rag
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  anomaly_detection:
    build:
      context: ./ai-services/anomaly_detection
      dockerfile: Dockerfile
    container_name: qos-anomaly-detection
    ports:
      - "8003:8003"
    environment:
      - MODEL_DEVICE=cpu
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  sla_forecasting:
    build:
      context: ./ai-services/SLA_forecasting
      dockerfile: Dockerfile
    container_name: qos-sla-forecasting
    ports:
      - "8004:8004"
    environment:
      - MODEL_DEVICE=cpu
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    container_name: qosentry-redis
    ports:
      - "0.0.0.0:6380:6379"
    networks:
      - qos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qosentry-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qosbuddy
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: qosentry_jwt_secret_dev_2026_secure
      APP_JWT_EXPIRATION_MS: 86400000
      AI_ANOMALY_BASE_URL: http://anomaly_detection:8003
      AI_SLA_BASE_URL: http://sla_forecasting:8004
      AI_AGENT_BASE_URL: http://agent:8002
      APP_AI_ALLOW_MOCK: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      anomaly_detection:
        condition: service_healthy
      sla_forecasting:
        condition: service_healthy
      agent:
        condition: service_healthy
    networks:
      - qos-network

  # ─────────────────────────────────────────
  # PROMETHEUS
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: qos-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - qos-network
    restart: unless-stopped
    depends_on:
      - anomaly_detection
      - sla_forecasting

  # ─────────────────────────────────────────
  # GRAFANA
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: qos-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=qosentry
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - qos-network
    restart: unless-stopped
    depends_on:
      - prometheus

# ─────────────────────────────────────────
# SHARED NETWORK & VOLUMES
# ─────────────────────────────────────────
networks:
  qos-network:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
  hf_cache:
  prometheus_data:
  grafana_data:
